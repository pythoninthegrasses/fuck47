<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fuck Forty Seven</title>
  <meta name="description" content="All bad news, all the time. Negative DJT coverage, silkscreened daily.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23221f1a'/%3E%3Ctext x='8' y='12.5' text-anchor='middle' font-family='Arial Narrow, sans-serif' font-weight='bold' font-size='11' fill='%23f4efe3'%3E47%3C/text%3E%3C/svg%3E">

  <script defer src="https://unpkg.com/alpinejs@3"></script>
  <style>
  @font-face {
    font-family: 'Anton';
    src: url('fonts/anton.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: 'Special Elite';
    src: url('fonts/special-elite.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
  }

  :root {
    /* The Print-Shop Palette (DESIGN.md) */
    --ink: #221f1a;
    --ground: #dfe2dd;
    --stock: #f1e6c9;
    --tan: #e8b98a;
    --olive: #48566d;
    --orchid: #ce769e;

    --masthead: 'Anton', 'Arial Narrow', Impact, sans-serif;
    --typewriter: 'Special Elite', 'Courier New', monospace;

    /* z scale: plates < portrait < halftone < type < controls */
    --z-plate: 1;
    --z-portrait: 2;
    --z-halftone: 3;
    --z-type: 4;
    --z-controls: 5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--ground);
    color: var(--ink);
    font-family: var(--typewriter);
    font-size: 1rem;
    line-height: 1.5;
    overflow: hidden;
  }

  [x-cloak] { display: none !important; }

  .poster {
    position: relative;
    height: 100dvh;
    width: 100vw;
    overflow: hidden;
  }

  /* ---- image layer: misregistered plates under a duotone black plate ---- */

  .portrait-frame {
    position: absolute;
    top: 0;
    right: 0;
    width: 50vw;
    height: 100dvh;
    z-index: var(--z-portrait);
  }

  .plate {
    position: absolute;
    z-index: var(--z-plate);
  }
  /* tan plate: deliberately off-register from the portrait above it */
  .plate-tan {
    top: 0;
    right: 10px;
    width: 50vw;
    height: calc(100dvh - 12px);
    transform: translate(-12px, 12px);
    background: var(--tan);
  }
  /* olive plate: low horizontal band behind the description block,
     sized from the story's own geometry so it overhangs equally on both sides */
  .plate-olive {
    /* left edge overhangs the centered .story box by 28px, mirroring its centered position */
    left: calc(clamp(16px, 3vw, 48px) / 2 + 26vw - min(17.5vw, 27ch) - 28px);
    bottom: calc(9dvh + 15vh);
    width: calc(min(35vw, 54ch) + 56px);
    height: 16dvh;
    transform: translate(0, 6px);
    background: var(--olive);
    font-size: 1rem; /* keeps its ch unit in step with the story's */
    z-index: var(--z-halftone); /* prints over the portrait edge, under the type */
  }

  .portrait-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: url(#silkscreen);
  }

  /* halftone screen over the black plate */
  .halftone {
    position: absolute;
    inset: 0;
    z-index: var(--z-halftone);
    background-image: radial-gradient(circle, rgba(34, 31, 26, 0.32) 1px, transparent 1.4px);
    background-size: 5px 5px;
    pointer-events: none;
  }

  /* ---- type layer: paste-up strips over the print ---- */

  /* left column flows top-to-bottom so variable-length titles can never collide */
  .type-col {
    position: absolute;
    inset: 0 auto 0 0;
    width: 52vw;
    z-index: var(--z-type);
    display: flex;
    flex-direction: column;
    /* bottom padding clears the PREV/NEXT row so the story never collides with it */
    padding: clamp(16px, 3vh, 32px) 0 calc(clamp(12px, 2vh, 24px) + 64px) clamp(16px, 3vw, 48px);
    pointer-events: none;
  }
  .type-col a, .type-col button { pointer-events: auto; }

  .content-group { display: contents; }

  .masthead .site {
    font-family: var(--masthead);
    font-size: clamp(1.25rem, 2.5vw, 1.75rem);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 1;
    color: inherit;
    text-decoration: none;
  }
  .masthead .tagline {
    font-size: 0.8125rem;
    margin-top: 6px;
    letter-spacing: 0.01em;
  }

  .headline-block {
    margin-top: auto;
    margin-bottom: auto;
    padding: 4vh 0;
    width: min(56vw, 100%);
  }
  h1.headline { max-width: 12em; }
  h1.headline {
    font-family: var(--masthead);
    font-weight: 400;
    line-height: 1.28;
    text-transform: uppercase;
    letter-spacing: 0.005em;
    text-wrap: balance;
    color: #fff;
  }
  /* size steps down as the wire headline gets longer; set via data-len from Alpine */
  h1.headline { font-size: clamp(2.25rem, 5vw + 0.5rem, 5.25rem); }
  .headline-block[data-len="long"] h1.headline { font-size: clamp(1.75rem, 3.4vw + 0.4rem, 3.5rem); }
  .headline-block[data-len="xlong"] h1.headline { font-size: clamp(1.4rem, 2.6vw + 0.3rem, 2.625rem); }
  /* each line is a strip of paper glued over the print */
  h1.headline span {
    background: var(--ink);
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
    padding: 0.09em 0.18em;
  }

  .story {
    width: min(50vw, 64ch, 100%);
    background: var(--stock);
    padding: 16px 20px;
    margin-top: clamp(16px, 3vh, 32px);
  }
  .story .desc {
    font-size: 1rem;
    line-height: 1.5;
  }
  .story .byline {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 16px;
    align-items: baseline;
    margin-top: 12px;
    font-size: 0.8125rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .story .byline a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 3px;
    padding: 8px 0;
  }
  .story .byline a:hover { background: var(--orchid); }
  .story .byline a:focus-visible,
  .controls a:focus-visible,
  .controls button:focus-visible {
    outline: 3px solid var(--ink);
    outline-offset: 2px;
  }

  /* issue stamp: one of the two permitted orchid strokes */
  .stamp {
    position: absolute;
    top: clamp(16px, 3vh, 32px);
    right: clamp(16px, 3vw, 48px);
    z-index: var(--z-controls);
    background: var(--orchid);
    color: var(--ink);
    font-size: 0.8125rem;
    letter-spacing: 0.08em;
    padding: 6px 10px;
    transform: rotate(2deg);
  }

  /* PREV sits at the image's left edge, NEXT at its right */
  .controls {
    position: absolute;
    left: calc(50vw + clamp(16px, 2vw, 32px));
    right: clamp(16px, 2vw, 32px);
    bottom: clamp(16px, 3vh, 32px);
    z-index: var(--z-controls);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
  }
  .controls button {
    font-family: var(--masthead);
    font-size: clamp(1.25rem, 2vw, 1.75rem);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    background: var(--ink);
    color: var(--ground);
    border: none;
    padding: 10px 22px;
    cursor: pointer;
    min-height: 44px;
    touch-action: manipulation;
  }
  .controls button:hover { background: var(--olive); }
  .controls button:active { transform: translate(1px, 1px); }

  .backissues {
    margin-top: calc(12px + 15vh);
    font-size: 0.8125rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .backissues a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 3px;
    display: inline-block;
    padding: 12px 0;
  }
  .backissues a:hover { background: var(--tan); }

  .credit {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    z-index: var(--z-type);
    font-size: 0.6875rem;
    letter-spacing: 0.04em;
    color: var(--ink);
    opacity: 0.75;
    writing-mode: vertical-rl;
  }

  /* ---- empty state ---- */
  .empty .desc { margin-top: 8px; }

  /* ---- no-JS fallback ---- */
  noscript ul {
    position: relative;
    z-index: var(--z-type);
    display: block;
    padding: 20vh 8vw;
    list-style: square;
    font-size: 1.125rem;
    line-height: 2;
  }
  noscript a { color: var(--ink); }

  /* ---- mobile: poster stacks, portrait keeps the majority ---- */
  @media (max-width: 899px) {
    body { overflow-y: auto; }
    .poster { height: auto; min-height: 100dvh; }

    .portrait-frame {
      position: relative;
      width: 100vw;
      height: 58dvh;
      margin-top: 84px;
    }
    .plate-tan {
      width: 100vw;
      height: 58dvh;
      top: 84px;
      right: 0;
      transform: translate(-8px, 10px);
    }
    .plate-olive { display: none; }

    .type-col {
      position: static;
      inset: auto;
      width: auto;
      padding: 0 clamp(12px, 4vw, 24px) 24px;
    }

    /* pin the masthead to the poster top; the flow column starts with the portrait */
    .masthead {
      position: absolute;
      top: clamp(16px, 3vh, 32px);
      left: clamp(12px, 4vw, 24px);
      z-index: var(--z-type);
    }

    /* type-col is static here, so re-anchor its children above the portrait */
    .headline-block, .story, .controls, .backissues {
      position: relative;
      z-index: var(--z-type);
    }

    .headline-block {
      margin: -16vh 0 0;
      padding: 0;
      width: auto;
    }
    h1.headline { font-size: clamp(2.25rem, 9vw, 3.25rem); }
    .headline-block[data-len="long"] h1.headline { font-size: clamp(1.875rem, 6.5vw, 2.25rem); }
    .headline-block[data-len="xlong"] h1.headline { font-size: clamp(1.5rem, 5.5vw, 1.75rem); }

    .story {
      width: auto;
      margin-top: 20px;
      transform: none;
    }

    /* keep the primary controls in the thumb zone regardless of scroll */
    .controls {
      position: fixed;
      left: auto;
      right: 12px;
      bottom: 12px;
      gap: 12px;
    }
    .backissues { margin: calc(12px + 15vh) 0 0; }
    .credit { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .controls button:active { transform: none; }
  }

  /* ---- desktop: title + description enlarged 30% and centered in the left column ---- */
  @media (min-width: 900px) {
    .poster {
      --story-width: min(35vw, 54ch);
      --story-overhang: 28px;
      --story-plate-top-reveal: 24px;
      --story-plate-bottom-drop: 18px;
    }
    .poster[data-desc-len="short"] {
      --story-plate-top-reveal: 30px;
    }

    .type-col {
      width: 45vw;
      padding-right: clamp(16px, 3vw, 48px);
    }

    .content-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: auto;
      margin-bottom: auto;
    }
    .headline-block {
      width: calc(var(--story-width) + 10vw); /* 5vw fan on each side */
      max-width: min(46vw, 66ch);
      margin-top: 0;
      margin-bottom: 0;
    }
    /* narrow the story so it always clears the portrait's tan plate */
    .story {
      position: relative;
      z-index: 0;
      width: var(--story-width);
      background: transparent;
      margin-top: clamp(8px, 2vh, 24px);
    }
    .story::before {
      content: "";
      position: absolute;
      top: calc(var(--story-plate-top-reveal) * -1);
      bottom: calc(var(--story-plate-bottom-drop) * -1);
      left: calc(var(--story-overhang) * -1);
      right: calc(var(--story-overhang) * -1);
      background: var(--olive);
      z-index: -2;
      transform: translateY(6px);
      pointer-events: none;
    }
    .story::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--stock);
      z-index: -1;
      pointer-events: none;
    }
    .story > * {
      position: relative;
      z-index: 1;
    }
    .plate-olive,
    [data-impeccable-variant="1"] > .v1-plate,
    [data-impeccable-variant="2"] > .v2-plate,
    [data-impeccable-variant="3"] > .v3-plate {
      display: none;
    }

    h1.headline { font-size: clamp(3.51rem, 7.8vw + 0.78rem, 8.19rem); }
    .headline-block[data-len="long"] h1.headline { font-size: clamp(2.73rem, 5.304vw + 0.624rem, 5.46rem); }
    .headline-block[data-len="xlong"] h1.headline { font-size: clamp(2.184rem, 4.056vw + 0.468rem, 4.095rem); }

    .story .desc { font-size: 1.56rem; }

    .backissues {
      position: absolute;
      left: clamp(16px, 3vw, 48px);
      bottom: clamp(16px, 3vh, 32px);
      margin-top: 0;
      font-size: unset;
    }
    .backissues a {
      font-family: var(--masthead);
      font-size: clamp(1.25rem, 2vw, 1.75rem);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      background: var(--ink);
      color: var(--ground);
      padding: 10px 22px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .backissues a:hover { background: var(--olive); }
  }
  </style>
</head>

        { file: 'gs_arizona-rally_20160319.webp', credit: 'Gage Skidmore', alt: 'Donald Trump at an Arizona rally, silkscreen-treated' },
        { file: 'usa_today_st_johns_20250522.webp', credit: 'USA Today', alt: 'Donald Trump, silkscreen-treated press photo' },
      ],
      idx: 0,
      timer: null,

      syncingHash: false,

      init() {
        try {
          this.articles = JSON.parse(document.getElementById('poster-articles').textContent);
        } catch (e) {
          this.articles = [];
        }

        const startIdx = this.indexForSlug(this.slugFromHash());
        if (startIdx !== -1) this.idx = startIdx;

        window.addEventListener('hashchange', () => {
          if (this.syncingHash) return;
          const found = this.indexForSlug(this.slugFromHash());
          if (found !== -1 && found !== this.idx) {
            if (this.timer) { clearInterval(this.timer); this.timer = null; }
            this.idx = found;
          }
        });

        window.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowRight') this.next();
          if (e.key === 'ArrowLeft') this.prev();
        });
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!reduced && this.articles.length > 1) {
          this.timer = setInterval(() => {
            if (!document.hidden) this.next(false);
          }, 12000);
        }

        const refit = () => this.fitHeadline();
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(refit);
        } else {
          refit();
        }
        this.$nextTick(refit);
        this.$watch('idx', () => this.$nextTick(refit));

        let resizeTimer = null;
        window.addEventListener('resize', () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(refit, 150);
        });
      },

      // scales the headline to fill the space between the masthead and the
      // story card exactly, so titles of any length neither overflow nor
      // leave the card too far below it. desktop-only: below 900px the
      // stacked mobile layout uses the CSS clamps in `.headline-block[data-len]`.
      fitHeadline() {
        const headline = this.$refs.headline;
        const block = this.$refs.headlineBlock;
        const desc = this.$refs.desc;
        if (!headline || !block) return;

        if (!window.matchMedia('(min-width: 900px)').matches) {
          headline.style.fontSize = '';
          if (desc) desc.style.fontSize = '';
          return;
        }

        const typeCol = this.$refs.typeCol;
        const masthead = this.$refs.masthead;
        const story = this.$refs.story;
        if (!typeCol || !masthead || !story) return;

        const outerHeight = (el) => {
          const cs = getComputedStyle(el);
          return el.getBoundingClientRect().height
            + parseFloat(cs.marginTop) + parseFloat(cs.marginBottom);
        };
        // Reserve CENTERING_PX for the auto-margin above/below .content-group
        // (40px top + 40px bottom). The backissues button is position:absolute
        // and doesn't participate in flex layout, so it isn't measured here.
        const CENTERING_PX = 80;
        const available = () => {
          const typeColRect = typeCol.getBoundingClientRect();
          const typeColCS = getComputedStyle(typeCol);
          const contentHeight = typeColRect.height
            - parseFloat(typeColCS.paddingTop) - parseFloat(typeColCS.paddingBottom);
          return contentHeight - outerHeight(masthead) - outerHeight(story) - CENTERING_PX;
        };

        const MIN_PX = 56.4; // reference: postal-service headline fits ~56.9px (47 × 1.2)
        const MAX_PX = 132;
        const fit = (space) => {
          if (space <= 0) return MIN_PX;
          headline.style.fontSize = MAX_PX + 'px';
          if (block.getBoundingClientRect().height <= space) return MAX_PX;
          let lo = MIN_PX, hi = MAX_PX;
          while (hi - lo > 1) {
            const mid = (lo + hi) / 2;
            headline.style.fontSize = mid + 'px';
            if (block.getBoundingClientRect().height <= space) {
              lo = mid;
            } else {
              hi = mid;
            }
          }
          headline.style.fontSize = lo + 'px';
          return lo;
        };

        // Reduce font until the wrap line count is proportional to title length.
        // Prevents short titles from stacking into many narrow lines.
        // Subtract block padding before computing line count so the 4vh top/bottom
        // padding doesn't inflate the estimate at small font sizes.
        const blockPad = () => {
          const cs = getComputedStyle(block);
          return parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
        };
        const countLines = (fontPx) =>
          Math.round((block.getBoundingClientRect().height - blockPad()) / (fontPx * 1.28));
        const reduceToLineTarget = (currentPx) => {
          const titleLen = (headline.textContent || '').trim().length;
          const maxLines = Math.max(2, Math.floor(titleLen / 16));
          if (countLines(currentPx) <= maxLines) return currentPx;
          let lo = MIN_PX, hi = currentPx;
          while (hi - lo > 0.5) {
            const mid = (lo + hi) / 2;
            headline.style.fontSize = mid + 'px';
            if (countLines(mid) <= maxLines) lo = mid; else hi = mid;
          }
          headline.style.fontSize = lo + 'px';
          return lo;
        };

        if (!desc) {
          reduceToLineTarget(fit(available()));
          return;
        }

        // The title should always read bigger than the body copy. Try the
        // description at progressively smaller sizes — each one frees up
        // more vertical space for the headline — until the fitted headline
        // is comfortably larger than the description, or we hit the floor.
        const DESC_SIZES_PX = [24.96, 21.6, 19.2, 17.4]; // 1.56rem, 1.35rem, 1.2rem, 1.0875rem
        const RATIO = 1.2;
        let fittedPx = MIN_PX;
        for (let i = 0; i < DESC_SIZES_PX.length; i++) {
          desc.style.fontSize = DESC_SIZES_PX[i] + 'px';
          fittedPx = fit(available());
          if (fittedPx >= DESC_SIZES_PX[i] * RATIO || i === DESC_SIZES_PX.length - 1) break;
        }
        reduceToLineTarget(fittedPx);
      },

      slugFromHash() {
        return decodeURIComponent(location.hash.replace(/^#/, ''));
      },
      indexForSlug(slug) {
        if (!slug) return -1;
        return this.articles.findIndex((a) => a.slug === slug);
      },
      syncHash(pushHistory) {
        if (!this.current || !this.current.slug) return;
        const hash = '#' + encodeURIComponent(this.current.slug);
        if (location.hash === hash) return;
        this.syncingHash = true;
        if (pushHistory) {
          history.pushState(null, '', hash);
        } else {
          history.replaceState(null, '', hash);
        }
        this.syncingHash = false;
      },

      get current() { return this.articles[this.idx] || null; },
      get lenClass() {
        const n = this.current ? (this.current.title || '').length : 0;
        if (n > 80) return 'xlong';
        if (n > 48) return 'long';
        return null;
      },
      get descLenClass() {
        const raw = this.current ? (this.current.description || '') : '';
        const n = raw.replace(/\s+/g, ' ').trim().length;
        return n > 0 && n <= 160 ? 'short' : null;
      },
      get image() { return this.images[this.idx % this.images.length]; },
      get source() { return (this.current && this.current.source || '').replace(/\s*>.*$/, ''); },
      get date() {
        if (!this.current || !this.current.published_at) return '';
        const d = new Date(this.current.published_at.replace(' ', 'T'));
        if (isNaN(d)) return this.current.published_at;
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      },

      next(user = true) {
        if (!this.articles.length) return;
        this.idx = (this.idx + 1) % this.articles.length;
        this.syncHash(user);
        if (user && this.timer) { clearInterval(this.timer); this.timer = null; }
      },
      prev() {
        if (!this.articles.length) return;
        this.idx = (this.idx - 1 + this.articles.length) % this.articles.length;
        this.syncHash(true);
        if (this.timer) { clearInterval(this.timer); this.timer = null; }
      },
    }));
  });
  </script>
